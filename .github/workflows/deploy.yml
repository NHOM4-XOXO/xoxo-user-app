name: CI/CD Deploy to EC2 (Docker Hub + Docker Compose)

on:
  push:
    branches:
      - create/ec2 # hoặc dev, tuỳ bạn muốn deploy nhánh nào

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build & Push Docker image
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-app:latest
      - name: Copy docker-compose 
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.EC2_KEY  }}
          source: "./docker-compose-user.yml"
          target: "~/app"

      # 4. Deploy trên EC2 (pull từ Docker Hub)
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app
            docker-compose pull
            docker-compose down
            docker-compose up -d
