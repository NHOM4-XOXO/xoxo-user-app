name: CI/CD Deploy to EC2 (Docker Compose)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t nphoang151/xoxo-app:latest .

      # 3. Save image để copy sang EC2
      - name: Save Docker image
        run: docker save nphoang151/xoxo-app:latest | gzip > nphoang151/xoxo-app.tar.gz

      # 4. Copy image + docker-compose.yml sang EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: |
            xoxo-app.tar.gz
            docker-compose.yml
          target: "/home/ec2-user/app/"

      # 5. SSH vào EC2 để deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app
            docker load < xoxo-app.tar.gz
            docker-compose down
            docker-compose up -d
